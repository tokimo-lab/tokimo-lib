name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Linux Docker image
        run: docker build -f docker/Dockerfile.linux -t tokimo-lib-linux-build .

      - name: Build and bundle Linux
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            tokimo-lib-linux-build \
            bash -lc 'git config --global --add safe.directory /work && ./scripts/build-linux.sh && ./scripts/bundle-runtime-deps.sh && ./scripts/verify-bundle.sh'

      - name: Fix Linux artifact permissions
        run: sudo chown -R "$(id -u):$(id -g)" install

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokimo-lib-linux-x86_64
          path: install/tokimo-lib-linux-x86_64.tar.zst
          if-no-files-found: error

  macos:
    name: macos-arm64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache macOS Homebrew files
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: macos-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('components.toml', 'scripts/build-macos.sh') }}
          restore-keys: |
            macos-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Build macOS bundle
        run: bash scripts/build-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokimo-lib-macos-aarch64
          path: install/tokimo-lib-macos-aarch64.tar.zst
          if-no-files-found: error

  windows:
    name: windows
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows bundle
        run: bash scripts/build-windows.sh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: tokimo-lib-windows-x86_64
          path: install/tokimo-lib-windows-x86_64.tar.zst
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-22.04
    needs: [linux, macos, windows]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate release body
        run: |
          {
            echo "## SHA256"
            echo
            echo "Use these checksums to pin release artifacts in deps.toml:"
            echo
            echo '```'
            sha256sum \
              dist/tokimo-lib-linux-x86_64/tokimo-lib-linux-x86_64.tar.zst \
              dist/tokimo-lib-macos-aarch64/tokimo-lib-macos-aarch64.tar.zst \
              dist/tokimo-lib-windows-x86_64/tokimo-lib-windows-x86_64.tar.zst
            echo '```'
          } > dist/release-body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-body.md
          files: |
            dist/tokimo-lib-linux-x86_64/tokimo-lib-linux-x86_64.tar.zst
            dist/tokimo-lib-macos-aarch64/tokimo-lib-macos-aarch64.tar.zst
            dist/tokimo-lib-windows-x86_64/tokimo-lib-windows-x86_64.tar.zst
