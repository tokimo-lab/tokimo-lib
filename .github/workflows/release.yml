name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Linux build files
        uses: actions/cache@v4
        with:
          path: |
            build
            .cache
          key: linux-build-${{ runner.os }}-${{ hashFiles('components.toml', 'scripts/build-linux.sh', 'scripts/bundle-runtime-deps.sh', 'scripts/verify-bundle.sh', 'docker/Dockerfile.linux') }}
          restore-keys: |
            linux-build-${{ runner.os }}-

      - name: Build Linux Docker image
        run: docker build -f docker/Dockerfile.linux -t tokimo-lib-linux-build .

      - name: Build and bundle Linux
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            tokimo-lib-linux-build \
            bash -lc './scripts/build-linux.sh && ./scripts/bundle-runtime-deps.sh && ./scripts/verify-bundle.sh'

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-linux
          path: install/install-linux.tar.zst
          if-no-files-found: error

  macos:
    name: macos-arm64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache macOS build files
        uses: actions/cache@v4
        with:
          path: |
            build
            .cache
            ~/Library/Caches/Homebrew
          key: macos-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('components.toml', 'scripts/build-macos.sh') }}
          restore-keys: |
            macos-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Build macOS bundle
        run: bash scripts/build-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-macos-arm64
          path: install/install-macos-arm64.tar.zst
          if-no-files-found: error

  windows:
    name: windows
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Windows build files
        uses: actions/cache@v4
        with:
          path: |
            build
            .cache
          key: windows-build-${{ runner.os }}-${{ hashFiles('components.toml', 'scripts/build-windows.sh') }}
          restore-keys: |
            windows-build-${{ runner.os }}-

      - name: Build Windows bundle
        run: bash scripts/build-windows.sh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-windows
          path: install/install-windows.tar.zst
          if-no-files-found: error

  release:
    name: release
    runs-on: ubuntu-22.04
    needs: [linux, macos, windows]
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate release body
        run: |
          {
            echo "## SHA256"
            echo
            echo "Use these checksums to pin release artifacts in deps.toml:"
            echo
            echo '```'
            sha256sum \
              dist/install-linux/install-linux.tar.zst \
              dist/install-macos-arm64/install-macos-arm64.tar.zst \
              dist/install-windows/install-windows.tar.zst
            echo '```'
          } > dist/release-body.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-body.md
          files: |
            dist/install-linux/install-linux.tar.zst
            dist/install-macos-arm64/install-macos-arm64.tar.zst
            dist/install-windows/install-windows.tar.zst
