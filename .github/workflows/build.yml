name: Build

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  linux:
    name: linux
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Linux Docker image
        run: docker build -f docker/Dockerfile.linux -t tokimo-lib-linux-build .

      - name: Build and bundle Linux
        run: |
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            tokimo-lib-linux-build \
            bash -lc 'git config --global --add safe.directory /work && ./scripts/build-linux.sh && ./scripts/bundle-runtime-deps.sh && ./scripts/verify-bundle.sh'

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-linux
          path: install/install-linux.tar.zst
          if-no-files-found: error

  macos:
    name: macos-arm64
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache macOS Homebrew files
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: macos-build-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('components.toml', 'scripts/build-macos.sh') }}
          restore-keys: |
            macos-build-${{ runner.os }}-${{ runner.arch }}-

      - name: Build macOS bundle
        run: bash scripts/build-macos.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-macos-arm64
          path: install/install-macos-arm64.tar.zst
          if-no-files-found: error

  windows:
    name: windows
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Windows bundle
        run: bash scripts/build-windows.sh

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: install-windows
          path: install/install-windows.tar.zst
          if-no-files-found: error
